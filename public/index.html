<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shimmy UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1 data-i18n="appName">Shimmy UI</h1>
            <p data-i18n="subtitle">本地推理运维控制台</p>
          </div>
        </div>
        <div id="status-pill" class="status-pill idle">已停止</div>
        <nav class="nav">
          <button data-tab="overview" data-i18n="overview" class="active">概览</button>
          <button data-tab="models" data-i18n="models">模型</button>
          <button data-tab="chat" data-i18n="chat">对话</button>
          <button data-tab="runtime" data-i18n="runtime">运行时</button>
          <button data-tab="config" data-i18n="config">配置</button>
          <button data-tab="logs" data-i18n="logs">日志</button>
        </nav>
        <div class="actions">
          <button id="start-btn" class="primary" data-i18n="start">启动</button>
          <button id="stop-btn" class="secondary" data-i18n="stop">停止</button>
        </div>
        <p id="setup-hint" class="setup-hint hidden"></p>
      </aside>
      <section class="content">
        <section id="overview" class="tab active">
          <div class="stats">
            <article><span data-i18n="service">Service</span><strong id="stat-service">-</strong></article>
            <article><span data-i18n="gpu">GPU</span><strong id="stat-gpu">-</strong></article>
            <article><span data-i18n="modelCount">模型数</span><strong id="stat-models">-</strong></article>
            <article><span data-i18n="memory">Memory</span><strong id="stat-memory">-</strong></article>
          </div>
          <div class="panel">
            <div class="panel-head">
              <div>
                <h2 data-i18n="overview">概览</h2>
                <p id="endpoint">http://127.0.0.1:11435</p>
              </div>
              <button id="refresh-btn" class="secondary" data-i18n="refresh">刷新</button>
            </div>
            <div class="details">
              <div><span data-i18n="binary">二进制</span><strong id="binary-path">未找到</strong></div>
              <div><span data-i18n="managedPid">托管 PID</span><strong id="managed-pid">-</strong></div>
            </div>
          </div>
        </section>
        <section id="models" class="tab">
          <div class="panel">
            <div class="panel-head">
              <h2 data-i18n="models">模型</h2>
              <button id="discover-btn" class="secondary" data-i18n="discover">发现</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th data-i18n="model">模型</th><th data-i18n="source">来源</th><th data-i18n="size">大小</th><th data-i18n="type">类型</th><th data-i18n="params">参数</th><th data-i18n="action">操作</th></tr></thead>
                <tbody id="models-body"></tbody>
              </table>
            </div>
          </div>
        </section>
        <section id="chat" class="tab">
          <div class="chat-grid">
            <div class="panel form">
              <label><span data-i18n="model">模型</span><select id="chat-model"></select></label>
              <label><span data-i18n="temperature">Temperature</span><input id="temperature" type="number" min="0" max="2" step="0.1" value="0.7" /></label>
              <label><span data-i18n="topP">Top P</span><input id="top-p" type="number" min="0" max="1" step="0.05" value="0.9" /></label>
              <label><span data-i18n="maxTokens">Max Tokens</span><input id="max-tokens" type="number" min="1" max="131072" value="128" /></label>
            </div>
            <div class="panel form">
              <label><span data-i18n="prompt">提示词</span><textarea id="prompt">Say hi in five words.</textarea></label>
              <button id="send-btn" class="primary" data-i18n="send">发送</button>
              <pre id="chat-output">-</pre>
            </div>
          </div>
        </section>
        <section id="runtime" class="tab">
          <div class="panel">
            <div class="panel-head">
              <div>
                <h2 data-i18n="runtime">运行时</h2>
                <p data-i18n="runtimeHint">下载和卸载只影响 Shimmy UI 托管的二进制。</p>
              </div>
              <button id="runtime-refresh" class="secondary" data-i18n="refresh">刷新</button>
            </div>
            <div class="details">
              <div><span data-i18n="installed">已安装</span><strong id="runtime-installed">-</strong></div>
              <div><span data-i18n="latest">最新</span><strong id="runtime-latest">-</strong></div>
              <div><span data-i18n="updateAvailable">可更新</span><strong id="runtime-update">-</strong></div>
              <div><span data-i18n="managedPath">托管路径</span><strong id="runtime-path">-</strong></div>
              <div><span data-i18n="asset">Asset</span><strong id="runtime-asset">-</strong></div>
              <div><span data-i18n="checksum">校验</span><strong id="runtime-checksum">-</strong></div>
            </div>
            <div class="runtime-actions">
              <button id="runtime-download" class="primary" data-i18n="download">下载</button>
              <button id="runtime-install" class="secondary" data-i18n="install">安装</button>
              <button id="runtime-update-btn" class="secondary" data-i18n="update">更新</button>
              <button id="runtime-rollback" class="secondary" data-i18n="rollback">回滚</button>
              <button id="runtime-uninstall" class="secondary danger" data-i18n="uninstall">卸载</button>
            </div>
          </div>
          <div class="panel runtime-backups">
            <div class="panel-head"><h2 data-i18n="backups">备份</h2></div>
            <div id="runtime-backups"></div>
          </div>
        </section>
        <section id="config" class="tab">
          <div class="panel form-grid">
            <label><span data-i18n="shimmyPath">Shimmy 路径</span><input id="shimmy-path" placeholder="/usr/local/bin/shimmy" /></label>
            <label><span data-i18n="bindAddress">绑定地址</span><input id="bind-address" /></label>
            <label><span data-i18n="modelDirs">模型目录</span><input id="model-dirs" placeholder="/models;/Volumes/LLM" /></label>
            <label><span data-i18n="baseGguf">Base GGUF</span><input id="base-gguf" placeholder="/models/tinyllama.gguf" /></label>
            <label><span data-i18n="maxCtx">上下文窗口</span><input id="max-ctx" type="number" min="512" max="131072" /></label>
            <label><span data-i18n="gpuBackend">GPU backend</span><select id="gpu-backend"><option>auto</option><option>cpu</option><option>cuda</option><option>vulkan</option><option>opencl</option></select></label>
            <label><span data-i18n="language">语言</span><select id="language"><option value="zh">中文</option><option value="en">English</option></select></label>
            <label><span data-i18n="theme">主题</span><select id="theme"><option value="dark">深色</option><option value="light">浅色</option><option value="system">跟随系统</option></select></label>
            <button id="save-btn" class="primary" data-i18n="save">保存</button>
          </div>
        </section>
        <section id="logs" class="tab">
          <div class="panel">
            <div class="panel-head">
              <h2 data-i18n="logs">日志</h2>
              <div class="log-tools"><input id="log-filter" data-i18n-placeholder="filter" placeholder="过滤" /><button id="copy-logs" class="secondary" data-i18n="copy">复制</button><button id="clear-logs" class="secondary" data-i18n="clear">清空</button></div>
            </div>
            <pre id="log-output" class="logs" data-i18n="noLogs">暂无日志。</pre>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
